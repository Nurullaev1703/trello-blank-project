# fly.toml — Fly.io configuration for trello-server (NestJS)
app = "trello-server"
primary_region = "ams"  # Amsterdam — closest free region to CIS. Change to "fra" (Frankfurt) if needed.

[build]
  dockerfile = "Dockerfile"
  target = "production"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
